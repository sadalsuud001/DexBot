services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: dexbot-postgres
    environment:
      POSTGRES_USER: dexbot
      POSTGRES_PASSWORD: dexbot
      POSTGRES_DB: dexbot
    ports:
      - "5432:5432"
    volumes:
      - dexbot-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dexbot-redis
    ports:
      - "6379:6379"

  kafka:
    image: bitnamilegacy/kafka:3.7
    container_name: dexbot-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"

  minio:
    image: minio/minio
    container_name: dexbot-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: dexbot
      MINIO_ROOT_PASSWORD: dexbot123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dexbot-minio-data:/data

volumes:
  dexbot-postgres-data:
  dexbot-minio-data: